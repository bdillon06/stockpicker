# Render Blueprint for Swing Finder.
# Deploy: Render dashboard -> New -> Blueprint -> pick this repo. Local use is
# unaffected (bash run.sh still launches the Flask dev server on :5057).
services:
  - type: web
    name: swing-finder
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    # 1 worker (scans are CPU-bound + SQLite is single-writer); threads let a long
    # /api/refresh run without fully blocking other requests; long timeout because
    # warming the full universe from Yahoo can take minutes.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"

    # NOTE: the free tier has an EPHEMERAL filesystem and spins down after ~15
    # minutes idle, so the whole SQLite file is lost on every wake, deploy or
    # restart. All four tables live in it, and they do NOT degrade equally:
    #
    #   price_cache  / enrich_cache -> self-healing; the next scan refetches
    #                                  (~40-60s) and re-seeds from the snapshot.
    #   watchlist                   -> LOST. Starred tickers silently disappear.
    #   rank_history                -> LOST, so the "Δ 1d" column can never show
    #                                  movement: with no prior day it reports NEW
    #                                  forever. The feature is dead on free tier.
    #
    # Those last two cannot be recovered by refetching — they are user state.
    # A scan peaks around 200MB RSS (measured, 503 tickers), so the 512MB free
    # tier fits; persistence, not memory, is what the free plan actually costs.
    # To keep the watchlist and Δ 1d, move to a paid instance and uncomment:
    #
    # disk:
    #   name: data
    #   mountPath: /var/data
    #   sizeGB: 1
    # (add under envVars:)  - key: STOCKPICKER_DB
    #                         value: /var/data/stockpicker.db
